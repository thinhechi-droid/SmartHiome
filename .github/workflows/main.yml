name: Build Qt Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout ma nguon
        uses: actions/checkout@v4

      - name: Cai dat Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cai dat Ninja va CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cai dat Android SDK va NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;26.1.10909125"
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Cai dat Qt cho Android
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: linux
          target: android
          arch: android_arm64_v8a

      - name: Kiem tra cau truc source
        run: |
          echo "Dang o thu muc:"
          pwd
          echo "Danh sach file:"
          ls -la
          echo "Tim CMakeLists.txt:"
          find . -name "CMakeLists.txt" -print

      - name: Cau hinh CMake cho Android
        run: |
          "$QT_ROOT_DIR/bin/qt-cmake" \
            -S . \
            -B build-android \
            -GNinja \
            -DANDROID_SDK_ROOT="$ANDROID_SDK_ROOT" \
            -DANDROID_NDK_ROOT="$ANDROID_NDK_ROOT" \
            -DANDROID_PLATFORM=android-23 \
            -DCMAKE_BUILD_TYPE=Release \
            -DQT_ANDROID_PACKAGE_NAME=com.ken.smarthomene \
            -DQT_ANDROID_APP_NAME=SmartHomeNE

      - name: Build file APK
        run: cmake --build build-android --target apk --parallel

      - name: Kiem tra file APK da tao
        run: find build-android -name "*.apk" -print

      - name: Luu file APK
        uses: actions/upload-artifact@v4
        with:
          name: SmartHomeNE-android-apk
          path: build-android/**/*.apk
